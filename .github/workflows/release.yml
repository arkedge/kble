name: Release

on:
  push:
    branches:
      - main
    tags: ['v*']
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/release.yml
      # The release build now depends on this verifier, so exercise the build
      # (and the verify step) when the script changes too — otherwise a broken
      # verifier would only surface at tag-release time.
      - scripts/verify-release-binary.sh

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: install apt depenedencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Get Rust toolchain
        id: toolchain
        working-directory: .
        run: |
          awk -F'[ ="]+' '$1 == "channel" { print "toolchain=" $2 }' rust-toolchain >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.toolchain.outputs.toolchain }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: |
          cargo build --target=${{ matrix.target }} --release --locked

      - name: Rename binaries
        run: |
          mkdir bin
          kble_bins=("kble" "kble-c2a" "kble-dump" "kble-eb90" "kble-serialport" "kble-tcp")
          for b in "${kble_bins[@]}" ; do
            cp "./target/${{ matrix.target }}/release/${b}" "./bin/${b}-${{ matrix.target }}"
          done
          ls -lh ./bin

      # Mirror the gnu job's guard for the static musl binaries: assert each is
      # fully static (no dynamic loader). The x86_64 ones also get a `--help`
      # smoke run; the aarch64 ones are checked structurally only (can't execute
      # on the x86_64 runner). No glibc floor applies to a static binary.
      - name: Verify binaries are static musl builds
        run: |
          for f in ./bin/* ; do
            ./scripts/verify-release-binary.sh --libc musl "$f"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-executable-${{ matrix.target }}
          if-no-files-found: error
          path: ./bin/

  build_kble_serialport:
    name: build / kble-serialport (${{ matrix.target }})
    # The C2A Boom ecosystem is not validated on native Windows or macOS, so the
    # rest of the toolkit is built for Linux only (see the `build` job).
    # kble-serialport is the lone exception: it talks to local serial hardware
    # (USB-RS devices), so it has to run on the host OS rather than inside a Linux
    # VM. On Windows, exposing host USB to a WSL2 VM via the usbipd-win project is
    # still a bit unstable, so kble-serialport runs on the Windows host directly;
    # macOS is likewise a best-effort, non-first-party target. kble-serialport is
    # small and rarely changes, so shipping just it for these hosts is enough.
    # One macos-latest (Apple Silicon) runner cross-builds the x86_64 target too —
    # the preinstalled Xcode ships both-arch SDKs, so no extra linker is needed.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-2025
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get Rust toolchain
        id: toolchain
        working-directory: .
        shell: bash
        run: |
          awk -F'[ ="]+' '$1 == "channel" { print "toolchain=" $2 }' rust-toolchain >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.toolchain.outputs.toolchain }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: |
          cargo build --target=${{ matrix.target }} -p kble-serialport --release --locked

      # Windows binaries carry a .exe suffix; the apple-darwin ones do not.
      - name: Rename binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir bin
          ext=""
          [[ "$TARGET" == *windows* ]] && ext=".exe"
          cp "./target/${TARGET}/release/kble-serialport${ext}" "./bin/kble-serialport-${TARGET}${ext}"
          ls -lh ./bin

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-executable-${{ matrix.target }}
          if-no-files-found: error
          path: ./bin/

  build_gnu:
    name: build / glibc (${{ matrix.target }})
    # glibc (dynamically linked) counterparts to the musl binaries built by the
    # `build` job, shipped alongside them. Built with `cross` rather than a bare
    # `cargo build`: cross's *-unknown-linux-gnu images are Ubuntu 20.04 based
    # (glibc 2.31), so the binaries stay runnable on older distros. Building
    # natively on this ubuntu-24.04 runner would instead bake in its glibc 2.39
    # symbols and silently produce binaries that won't start on anything older.
    # Only these gnu targets go through cross; the musl build remains a native
    # cargo build (with the apt-installed musl-tools / aarch64 linker).
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get Rust toolchain
        id: toolchain
        working-directory: .
        run: |
          awk -F'[ ="]+' '$1 == "channel" { print "toolchain=" $2 }' rust-toolchain >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.toolchain.outputs.toolchain }}

      - name: install cross
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cross

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: |
          cross build --target=${{ matrix.target }} --release --locked

      - name: Rename binaries
        run: |
          mkdir bin
          kble_bins=("kble" "kble-c2a" "kble-dump" "kble-eb90" "kble-serialport" "kble-tcp")
          for b in "${kble_bins[@]}" ; do
            cp "./target/${{ matrix.target }}/release/${b}" "./bin/${b}-${{ matrix.target }}"
          done
          ls -lh ./bin

      # Guard against a non-portable build: assert every binary is a glibc
      # dynamic executable that runs on a glibc-2.31 system (see the script). The
      # x86_64 binaries also get a real `--help` smoke run; the aarch64 ones are
      # checked structurally only (can't execute on the x86_64 runner).
      - name: Verify binaries are portable glibc builds
        run: |
          for f in ./bin/* ; do
            ./scripts/verify-release-binary.sh --libc gnu "$f"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-executable-${{ matrix.target }}
          if-no-files-found: error
          path: ./bin/

  publish_dry_run:
    name: publish (dry-run)
    runs-on: ubuntu-24.04

    # This job checks that each crate is publishable to crates.io, which is a
    # question about current stable Cargo, not our MSRV. Library crates don't
    # ship their Cargo.lock, so the verify build re-resolves dependencies; on
    # the MSRV-pinned toolchain that pulls in deps requiring a newer Cargo (e.g.
    # idna_adapter needs the edition2024 feature, stabilized in 1.85). The MSRV
    # is verified separately by the `msrv` job in rust.yml. Run on stable and
    # override the repo's rust-toolchain pin via RUSTUP_TOOLCHAIN.
    env:
      RUSTUP_TOOLCHAIN: stable

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo publish (dry-run)
        run: |
          crates=("kble" "kble-socket" "kble-c2a" "kble-dump" "kble-eb90" "kble-serialport" "kble-tcp")
          for c in "${crates[@]}" ; do
            cargo publish --dry-run -p "${c}"

            echo ""
            # shellcheck disable=SC2086
            ls -lh ./target/package/${c}-*/
          done
          ls -lh ./target/package

  release:
    name: Release
    needs: [ build, build_gnu, build_kble_serialport, publish_dry_run ]
    permissions:
      contents: write

    runs-on: ubuntu-24.04

    steps:
      # Checked out into a subdir so the repo's `kble*` crate directories don't
      # collide with the `kble*` release-binary glob below. Only needed for
      # CHANGELOG.md; defaults to the tag ref that triggered this run.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: repo

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-executable-*
          merge-multiple: true

      - run: chmod +x kble-*

      - run: ls -lh

      # Pull this version's CHANGELOG section into the release body. With
      # generate_release_notes, action-gh-release pre-pends body to the
      # auto-generated "What's Changed" notes. Fails if the tag has no section,
      # to keep CHANGELOG.md and releases in lockstep.
      - name: Extract CHANGELOG section for ${{ github.ref_name }}
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v hdr="## [${ver}]" '
            index($0, hdr) == 1 { found = 1; capture = 1; next }
            capture && /^## \[/ { capture = 0 }
            capture { print }
            END { if (!found) { print "no CHANGELOG section for " hdr > "/dev/stderr"; exit 1 } }
          ' repo/CHANGELOG.md > "$RUNNER_TEMP/release-body.md"
          echo "----- release body -----"
          cat "$RUNNER_TEMP/release-body.md"

      - name: Release to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          body_path: ${{ runner.temp }}/release-body.md
          files: |
            kble*
