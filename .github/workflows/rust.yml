name: Rust

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  id-token: write
  contents: read
  checks: write
  pull-requests: write

env:
  # renovate: datasource=github-releases depName=EmbarkStudios/cargo-about
  CARGO_ABOUT_VERSION: 0.6.4

jobs:
  verify-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Get Rust toolchain
        id: toolchain
        working-directory: .
        run: |
          awk -F'[ ="]+' '$1 == "channel" { print "toolchain=" $2 }' rust-toolchain >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.toolchain.outputs.toolchain }}
          components: clippy, rustfmt

      - name: cache dependencies
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7

      - name: install cargo-about
        run: |
          cargo install --locked cargo-about --version ${{ env.CARGO_ABOUT_VERSION }}

      - name: reviewdog / clippy
        uses: sksat/action-clippy@87e08e0c289f2654fe702b0aaf88c2f1027a3e57 # v1.1.1
        with:
          reporter: github-pr-review

      - name: format
        run: cargo fmt --all --check

      # The plugs always enable kble-socket with `stdio` + `tungstenite`, so a
      # workspace build never exercises a single feature on its own. Check every
      # feature combination so a crate that advertises a feature can't ship one
      # that fails to compile by itself.
      - name: install cargo-hack
        uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: cargo-hack

      - name: check feature powerset
        run: cargo hack check --feature-powerset --no-dev-deps --workspace

      - name: unit test
        run: cargo test

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Get MSRV
        id: msrv
        run: |
          awk -F'[ ="]+' '$1 == "rust-version" { print "msrv=" $2 }' Cargo.toml >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - name: cache dependencies
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7

      # Verify the declared MSRV actually compiles. --all-targets pulls in the
      # dev-dependencies (notably proptest, which is version-capped in Cargo.toml
      # to keep this MSRV), and --locked ensures the committed Cargo.lock resolves
      # to versions that build on the MSRV toolchain.
      - name: check MSRV
        run: cargo check --workspace --all-targets --locked
