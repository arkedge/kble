name: Rust

on:
  push:
    branches: [ main ]
  pull_request:
  merge_group:

permissions:
  id-token: write
  contents: read
  checks: write
  pull-requests: write

env:
  # renovate: datasource=github-releases depName=EmbarkStudios/cargo-about
  CARGO_ABOUT_VERSION: 0.9.0

jobs:
  verify-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Get Rust toolchain
        id: toolchain
        working-directory: .
        run: |
          awk -F'[ ="]+' '$1 == "channel" { print "toolchain=" $2 }' rust-toolchain >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.toolchain.outputs.toolchain }}
          components: clippy, rustfmt

      - name: cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Prebuilt binary (like the msrv job): the tool's own rustc requirement
      # must not be coupled to the workspace's pinned toolchain.
      - name: install cargo-about
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: cargo-about@${{ env.CARGO_ABOUT_VERSION }}

      - name: reviewdog / clippy
        uses: sksat/action-clippy@87e08e0c289f2654fe702b0aaf88c2f1027a3e57 # v1.1.1
        with:
          reporter: github-pr-review

      - name: format
        run: cargo fmt --all --check

      # The plugs always enable kble-socket with `stdio` + `tungstenite`, so a
      # workspace build never exercises a single feature on its own. Check every
      # feature combination so a crate that advertises a feature can't ship one
      # that fails to compile by itself.
      - name: install cargo-hack
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: cargo-hack

      - name: check feature powerset
        run: cargo hack check --feature-powerset --no-dev-deps --workspace

      - name: unit test
        run: cargo test

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Get MSRV
        id: msrv
        run: |
          awk -F'[ ="]+' '$1 == "rust-version" { print "msrv=" $2 }' Cargo.toml >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - name: cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # The binary crates' build scripts invoke cargo-about (via notalawyer-build)
      # to bundle license info, so it must be on PATH even for a plain check. Use
      # a prebuilt binary so we don't recompile it under the MSRV toolchain.
      - name: install cargo-about
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: cargo-about@${{ env.CARGO_ABOUT_VERSION }}

      # Verify the declared MSRV actually compiles. --all-targets pulls in the
      # dev-dependencies (notably proptest, which is version-capped in Cargo.toml
      # to keep this MSRV), and --locked ensures the committed Cargo.lock resolves
      # to versions that build on the MSRV toolchain.
      - name: check MSRV
        run: cargo check --workspace --all-targets --locked
